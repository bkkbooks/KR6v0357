body:
  text: 西藏白教第二十四代上師白蓮花造藏德喀齊達瓦桑杜喇嘛譯英美國伊文思溫慈博士佐譯校釋三密弟子光明心譯漢甲一禮敬頂禮寶貴白系歷代上師甲二本文分二乙一所造文體乙二造文因緣今初為方便凡俗連續之能知使之面對聖智故此中闡明修法引導名曰俱生大手印瑜珈計分為三丙一入門教言丙二本文要義丙三結述既習瑜珈禪定則凡心已與聖心相應換言之凡俗識體已與超常大宇宙識體訴合無間此時人能如實了知本來面目當下證悟能知所知與一切種智本為一體不可分離悟證之時大手印頓與俱起大手印者密示心靈妙明之境也大手印譬諸點金石無明汙垢可藉之自心滌除蓋心經瑜珈冶鍊則凡也轉而為聖矣本文名為修法引導者以能指示行道者趨登圓覺涅般而解脫之道故非俟凡我與勝我冥合不能滅除人生之幻妄且非俟妄塵之滅不能徹悟所謂能知之連續宛然無起無盡與一切種智永合一體夫如是始可謂為轉凡成聖而面對聖智也丙一入門教言分二丁一世間教言丁二出世教言今初世間教言具如他處所明世間教言即係經論所載指示在家居士崇高之生活規範一經發心出家入道則世間或顯義教言已無必要頓即開始接受出世或密義教言固非未啓明之羣衆所能心領意會也丁二出世教言分六戊一皈依發心與上師相應戊二七支禪坐戊三七支禪坐之果戊四語清淨戊五意清淨戊六四念處今初出世教言以皈依發心及與上師相應為發端喬答摩如來獲得無上勝利為歷史上至足尊崇之典範宜乎佛教徒依為歸宿奉若導師學佛者踐其往跡以入於道應具信仰之心信仰心者固入道者之第一要需也若於可期成就之目的不具信仰則入道必不可能是以必須按學佛初規於入道之始行相當儀式以表信仰之誠藏中僧侶亦遵此規并採用五步儀軌如左一西藏皈依長文文之開首最要部份約等於南方佛教之短三皈文文為深荷上師居間加持謹皈依佛謹皈依法并復皈依僧侶之衆二發心簡文某今發心證得佛果藉助衆生悉登佛位三觀想禪定佛金剛薩埵并誦百字明以懺惡業四供奉曼達以表整個棄絶人寰厭惡輪回之意五與上師相應觀想歷代上師一一禪坐層纍而上世間上師則懸坐行者之頂餘則依傳承次第一一頂接最上為天上上師金剛持尊見中有聞教得度密法附譯遷升靈識瑜珈密法戊二現證毗盧遮那論云端直其身坐金剛座專繫一緣為大手印七支禪坐梵名阿灑那其功用在制止人體內某種靈流使為修習瑜珈之極大裨助能令體質柔順耐勞并可消除形體不適狀態愈諸疾病即身心亦為之寧靜現證毗盧遮那論者藏土關於瑜珈之著作示人悟證萬法皆幻之道毗盧遮那為位居中央之禪定佛法界或根本智其象徵也與之相應可現證人生之真實性藏僧所持之金剛杵猶帝王之圭笏金剛座者心身平衡之坐式以金剛之平衡喻之準此雙足應作佛座之式雙足作金剛式即通常佛像雙足交叉之式印度稱為蓮座雙手平衡置於臍下此為禪坐之式雙手展開掌心向上平置臍下兩中指尖相觸兩大指緊附二指末節之下脊柱徑挺胸部前突胸部前突時兩肩應向後屈頸如鈎狀下頦緊壓喉結舌抵上顎真喜主大師梵名司哇米薩底耶難達見序文以此節教言不甚完全曾來函評正云舌不宜抵顎實應捲而向上使舌尖屈曲若鈎貼於鼻之內孔入處并緊壓之如拴塞孔如是練習名為愷察利印蓋瑜珈行者坐禪時非此罕能證入寧靜狀態也逮至初學瑜珈者得有若干進程時愷察利印即不再需要練習之法先須調舌漸使加長以舌經摩挲後引而伸之自能加長也多數瑜珈行者復往往須於數月之內將舌底筋膜逐漸使離舌根方能遂其練習愷察利印之願動物之所以能蟄伏者正以用舌閉住鼻孔之故瑜珈行者藉此法亦力能停止體內氣流結果精神壽命均賴以保持然於心靈進程則毫無裨助人體之純物質與心靈功能惟有以瑜珈法門調伏之方能為克制劣我之助也心流常隨感覺而起以感於外物者為甚是以目勿轉瞬或勿遷動惟應注視一處約當於五英尺有半之距離原文為等於牛軛之距離牛軛者印度尺度依據兩牛間橫軛之寬度而定兩牛間之距離約為五英尺有半上乘七支禪坐名曰毗盧遮那七法亦即了解心物過程之七法所謂調整身體以深入禪定之五重法式即由此成立戊三雙腿交叉調節入息下行之氣雙手平衡體內熱流勻布傳溫度於遍體之氣脊柱徑挺胸部前突調節腦液普及全身周遍傳布之氣屈頸調節出息上行之氣舌抵上顎目注一處靈熱入於中脉靈熱者保持壽命之氣上來五種氣流係指體內機能運行之力歐西生理學尚無適當術語梵名為鉢若那見中有聞教得度密法附録中脉者人體靈熱經過之主要孔道徑自脊柱中心伸出支末靈脉由此分枝心物賴以運行之靈熱即自各靈脉分布流入蓮穴詳見同書如是五種氣流既入中脉專司其他機能之氣流同時亦入爾時智起入於捨念樂住名為心清淨或身無動或身住本性消化分泌血液循環心念運行感覺等機能之進程即為其他氣流之作用身之本性如一切法之本性為滿分清淨之境戊四出息既盡止息出入名為語清淨或語不動或語住本性勿思過去勿思當來亦毋作念正坐禪關所觀真空切毋視若無物之空真空梵名薰牙塔非指無物之空但為如如之境亦即真如蓋萬象所自萬有之因也非依世俗經驗安立之名言所可銓釋彼心靈未啓迪者遂視為無物之空耳爾時切勿嘗試推究感官所緣之境為是為非至少應在少分時間內保持禪觀勿任間斷令身安靜恰如嬰孩酣睡之狀同時使心住於本性勿任心念流轉也謂是謂非即落兩邊非菩提道所謂之中道也戊五古聖遺教云心毋起念亦毋造像體常靜如嬰酣睡謙溫虔敬遵師教法俱生之境證取無疑證取俱生之境即修習大手印瑜珈之目的諦洛巴祖師云勿作意勿思維勿推究勿觀想勿憶念心安住本性境正法大師月光青年云心不外馳為一切佛所踐之道正法大師月光青年指岡巴波上師又名達波拉傑即白教第二代祖師密喇熱巴尊者之傳鉢弟子古德寶訓即岡所纂集上來所引教言名為意清淨或意不動或意住本性心不外馳者含有身語意三業滿分清淨之意按諸此中瑜珈行法身語意三互相倚托不可分離於此應知藏文納爾倦之一字等於梵文之瑜珈惟不若瑜珈之以相應為義而解作滿分清淨即善巧於靜慮也戊六龍樹菩薩白王言勗哉大王已知四念處實為諸佛所行惟一之道宜於一切時注視念處保持不懈以於此沉掉一切行法無有用處故藏僧相傳龍樹降生於西歷紀元前一世紀或為在世尊涅般後四百年之時期住世共六百年當紀元後二三世紀之時仍在世間說法此後據云退隱南天竺為國王說修法之門王敬愛供養奉若國師本節所引即菩薩說法原文也菩薩首闡中道教法藏土佛學深荷影響終演變為北方佛教論藏大智度論之中心義理國王名勇日梵名藏土稱為德卓贊波信崇佛法菩薩說法時意在勗勉國王心注四念處之重要四念處者可比之梵語之此翻為念分別為四一身念處即觀身性空二受念處觀五受陰空無所起三心念處觀諸法不生不滅四不絶注視前三處行法是以名為修法之門諸佛者已證涅般之一切佛也念之境相為心不散馳對法論釋云念謂於慣習境令心明記不忘為體對法論者有宗之基本論猶大智度論之於空宗也入門教言竟丙二本文要義分三己一通俗修法己二非常修法己三教言撮要初又分二庚一修習專繫一緣之瑜珈證取身語意清淨之境即禪定之境庚二修習無生瑜珈觀察動不動性以證超世識體初又分三辛一緣於外物辛二不緣外物辛三最後寂靜之境初又分二壬一不調息緣物壬二調息緣物初又分二癸一緣於尋常物體如小球形物或小木段癸二緣於清淨法物如佛身語意之表徵通俗修習之鵠的為獲得塵世或天界之安樂而非常修習之鵠的則為超諸天超一切世界與超生死之涅般一緣者梵名心注一處義即指深切集中意識於一物或一念也無生者藏語探達爾離於生之謂或謂之涅般別於生死或萬象也是以無生瑜珈為證入無生之涅般道不動性者超世之真心於動性或無常性之萬象如為傍難者動性擬之心念之生滅下文當明超世識體即涅般或超生死之識體癸一今當宣示繫緣小球形或小木段法球形物不論其質或木或骨或金屬或泥土或玻璃或水晶均可為用木段亦不限形式行者之前置一小球或小木一段為所緣勿任能知馳離所緣或試認為合於所緣惟應一心緊繫所緣所用木段通常為竿形植於山穴或禪定所在地內即以削尖之端插入地中能知者藏語顯巴心也即起念或起知時之心亦即見分也觀想上師如在頂門與佛無異以發菩提心文向之祈求并加禱語如下深願賜豫恩波俾證大手印之無上利樂塵世有情在無量數劫生死流轉中必曾一度為母是以母數無盡正如虛空之無邊發菩提心文所指之母應作如是觀其文如下某等有情一度為母迄至現在為數無盡恰如虛空亦無窮盡皈依上師如法身佛皈依上師如報身佛皈依上師仁慈化身謹皈依佛至寶之尊願諸有情心向正法願諸有情修行成就消除業障轉成正智三身為自凡入聖修行過程之三地恩波者靈力之流心靈之開展由之激發於修證大手印瑜珈無上利樂涅般正覺之行者裨助極宏如是恩波流自住世或一切聖土內之上師如為電傳真實之心靈輸入灌頂即藉恩波之賜豫而成就也禱畢觀想恩波攝入自身并想自心已與諸上師淨心交融隨即心住如是相應之境以能持久為度行者必須先與世間上師相應再由之而上與歷代上師一一相應行法庶能安全而順利蓋凡心必藉上師聖心滌之使淨密與真心契合以獲大成就也定中所經剎那剎那任何境界應即按時稟白上師然後繼續住定迫於疲勞堅守所緣禪坐之處宜於遠矚心如惛沉亦依此法舉心使高使不放佚悼舉心生宜坐禪室降心使平主要目的在令身心暫得舒適久於禪坐身心必勞易墮惛沉之境行者為清醒身心掃除障礙計亟應徑登幽僻山巔爾時遠瞻景物視力復堅心神爽適可以繼續禪坐矣癸二緣於清淨法物分三子一佛像子二字相子三種子今初佛像或為金屬體或為布畫或僅心觀佛像煥爛金身萬行莊嚴圓滿相好光輪環首三衣加身觀想常在面前子二觀想月輪當前大如指甲上有吽字細如毛髮月輪為無明暗障逐漸消除之象徵猶月之自昃而盈黑黯漸失也吽字通常象徵心之本性惟此處則表語之本性原以阿字表之以僅為觀想之初步練習也其義為是或為存在文中凡涉及觀想字相均加注釋西方學者志在瑜珈教法之實修如有明哲指示則藏文字母固可以譯音代之禪觀要素在觀得其宜設能依教修觀不論用何種字相自得正確效果惟如以譯音代藏文則應如咒文之非先正音不可子三觀想種子大如豆形橢圓如卵光耀奪目應即緣之大瑜珈師於火葬後其尸架之灰燼中往往發見石灰質物形圓如珠蓋藏型之種子也羣視為聖力或菩提心自肉體顯現之確證或為法身在報身應身體上之反映是以應觀想之如有淨光加被壬三分二丑一金剛誦息丑二緣於壺形今初金剛或祕密誦息藏語多傑兮台巴梵名嚩日囉耶巴無聲數息之謂下文當明壺形調息藏語盆降即指藏中所修觀想丹田為壺形之瑜珈法詳見下文身心保持清淨之時應排除其他一切想念惟心觀每一息之出入自初次默數至二萬一千六百次如此可使行者獲得善巧以知每日出入息之次數西藏高原高出海平面約自一萬二千英尺至一萬五千英尺是以藏人肺力強於尋常歐西人士以高原空氣所含養氣較低地為少故藏人為攝取充分養氣計吸入空氣之量自須多於歐西人士此實天使之適合於環境也至藏人在指定之若干時間內其吐納次數是否較我人正常所呼吸者為多為少則非經試驗不能决定但無論如何藏土上師以為在正常狀態下每日二十四小時約共應有二萬一千六百次呼吸即以出入息共為一次計每小時九百次每分鐘十五次數息之意在使呼吸整齊合拍以達瑜珈調體之目的復次觀想入息起於何時出息後須經若干秒鐘息入時是何狀况并須思量入息是否及於身體一部份以上以如是修習故心自隨息出入而得調和若合符節如是了知出入息之本性藏土瑜珈行者通常於息之如何出入不甚明了故教以如是推究之法復次心緣息之出入細觀入息如何自鼻端經由鼻孔達至肺稍如何進入并在出息前停留若干時間學人應知按瑜珈教法納入之空氣其主要養生部份非係藉肺部功能輸入血內之養氣而為前文所示心物賴以運行之氣流如是修習自能如實了知息之每一出入是何色彩須時若干停留若干時間入息時納入之氣淨潔晶明謂為色淨出息時吐氣反是謂之不淨復次應就體內五大即地水火風空等大分別細觀勿使相混觀時應注意吐納次數之或增或減常泛反觀體內使知各器管之組合與責司以及氣流與熱流之表現與集中莫非五大之作用其純物質之成份為地大液體為水大體溫為火大氣體部份為風大較為微細之靈力為空大如是修習行者必自覺氣血之循環各氣管之運行心念之生滅猶如目睹縱以上來宣說之初步修習而論西方讀者自將了悟瑜珈之為學不僅須有崇高之心性且需具有關於形體之高深智識方能淹通之以善巧調伏體內各器管之一切部份及其所司而用之於正也次當觀想每一出息為白色嗡字每一入息為藍色吽字息在停留期間則為紅色阿字如是出入息之每一部份須若干時間無待思量當下便知矣以心或肺所司任運而行故瑜珈方法於出入息之時間亦必使之自動合拍上來教言至前兩節止雖僅涉初步修法而於入門者之進修教法全為必要之準備此中嗡字為佛尊聖力之表徵白色則象徵清淨出息如是轉成嗡字密音并為所滌淨即自運行世界感應所及無非悲憫仁慈一般藏土人士并信凡大瑜珈師所吐之氣一經吸入則疾病可袪惡業亦消吽字者象徵佛菩薩尊靈力之化體應觀想之如為喬答摩如來之靈力當入息轉成吽字告盡之時其在停留期間復變為阿字以表佛聲之本性或如震動一切世界之聖音為佛語也是以不論何人聽聞瑜珈行者所說不論何語必荷靈澤必獲法力吽字之藍色恰如無邊際之青天象徵常存不變阿字之紅色則聖慈也丑二復次緣壺形者應用力吐出內部濁氣移使盡絶分三步行之一自鼻孔徐徐吸入外氣二氣入後觀想成為壺形三使氣留住以能持久為度所謂心者恆隨息出入念念轉變以不能離息專其所司故甚難控制今依如是修法可以調伏不復倚息起伏此節藏本原文意奧難解今另說明如左通常一念所占時間等於一息息轉變時念亦隨變心之調伏本為難事以依本節教法不斷修習故當可成就爾時心即不再隨息而轉矣世人竭盡所能以保持想念之不變而息之轉變通常能造成想念之若干或少分變易或竟使另起新念以代之是以緣壺形修法之目的即在於修心使離息而獨立縱有想念起落亦不為所影響蓋心之造像純因激蕩而起激蕩既平想念自止心亦臻於本來如如之境關於心息之互相倚托印度奧義書言之詳矣辛二分三寅一剎那念起頓即根斷寅二任念運行不生分別寅三心住清淨本性想念來擾不為所動今初簡言之即一立斷想念二任念所之不加制止三心住圓妙清靜之境依照上來教法禪坐之際以心隨激蕩而起念故行者自覺百念叢生連續不絶既知一念之生尚須抑制應自作意勿任雜念生起是以於一念初起之時應立即自根斷絶續住於定禪定時力避起念為時既久終覺念起念落接踵而至為數無量是為念之覺知換言之即仇讐之發見也如是境界謂之初住初住者所臻最初寂靜之境於是行者靜觀念起念落不絶如縷而漠然無動於中如人止足河濱靜觀洪流瑜珈行者以心念難馴視若仇讐原文初住一節直譯之為是名初住擬諸河濱流水所經為宏暢真實意義故唯有不嫌辭費以意譯出之易言之瑜珈行者如已順利到此境界則心已離念而自主可以進修高深教法而趨於涅般之道矣一度心臻冥寂縱為一剎那間已能了解念之生滅爾時便覺想念紛至沓來愈益增多實則念來不斷不增不減頓時而有離念而立能止念生起者實相是也一剎那間者印度瑜珈師解云三百蕉葉一一叠積舉刃一揮葉葉皆截其第一二兩葉截分時相隔之期間即為一剎那間實相藏語丘涅特非人類之心識但為觀照念念相續之正知僅至一真之境方能悟證如行者在此境界與實相相應并與心之本源契合則念可使斷如電機之轉換器電流可以任意啓閉也寅二任念運行心勿傾側之法即置念於度外任其所之既不為念所左右亦不勉使斷絶務使心如牧人任羊覓食而續住於定如是念將不起心臻清淨而繫於一緣矣本節教法與上節所示似為相違然於熟習瑜珈初步修法之行者并不視為矛盾以初步修法之全旨在調伏其心猶拉丁文之於學童必須修習也依照上節修法行者將證悟念與息同純出自然以人生理正常心意活躍故念與肉體相關連任何部份之運行同屬不可制止也本節修法則引達實在目的地爾時能知現證超識側立注視念念相續任運流行略無沾戀復次念猶閃動有若流星閃爍天空而連續不斷念之動也如為流星閃爍天際又如發矢貫空或如縷烟風前蕩漾藏語以擬聲之拳拳一字表之如前禪坐相續安住寂靜之境名為寂靜中住爾時清淨無擾如水靜流心任弛縱心垢澄清心垢者想念也詳見下文正法大師云心任弛則靜水無擾則明文中未舉大師之名然不為岡波巴大師必為宗聖蓋本文源出白系而兩尊俱為禮敬分所指歷代白系上師之著名傳鉢人也瑜珈至尊密喇熱巴尊者云心住本來不變之境正知開朗此境相續有如靜流圓智可證咄爾行者心毋造像亦毋調伏永持寂靜莎喇哈大師於與禪定相關之雙重修法撮其要旨如下頌云心為束縛流於十方如任散馳堅定不搖因知心者頑強如駝寅三分四卯一如紡梵線卯二如斷草索卯三如孩凝視卯四如象無覺今初心應持平慎持之如紡梵線紡線不宜過於緊密亦勿過於稀疏惟應平勻行者坐禪亦復如是心毋太張太張則念失調伏亦毋太弛太弛則懈怠必生是以禪坐心應持平梵線者印度梵族所佩以志別於他族也相傳梵線為童女所紡紡時最極注意以線斷則災禍臨莎喇哈大師身出梵族故用以為喻也想念必須調伏以心緣之如為牧人守其羊羣禪定之初行頓斷想念法故心易緊張行久則疲勞應令心放弛任意運行注見寅二本宗所傳張弛交用修法今已說明心之張弛猶紡梵線之疏密是以名為心應持平如紡梵線之境卯二令心離念如草索裂斷時此節離於彼節之狀此法行者應以堅撓不屈之志相續作意心不他馳以依上來教法斷念時新念隨生故上來修法或止念之生或調伏之或任所之修時他念不免生起本節主旨則在證得較勝冥寂之境每一節草索象徵一念而全索則示念念相續如草索之應使裂斷也上來教法止觀雙運而新念生起為定之障此時行者不待告知當已自覺進步究屬有限與所期目的相距尚遠然終將了悟欲求前進仍須修習一如體育家之成長必須強其筋骨也觀與能觀兩俱遮遣令心住於隨順寂靜之境此法名為令心斷離一切想念捨棄加行如是離法以草索之斷裂喻之卯三心如幼童凝神而視寺廟壁畫心應繫於觀與能觀如象之拴於柱石如是則氣流各自儲藏於自有之孔道內上文以心頑強難馴喻如駱駝此處視若滯重不易揮動以象擬之氣流者體內靈熱之支流共為十數梵名其字根作呼吸或吹氣解蓋指靈熱之推動力也氣流為陰性之靈熱司人體內部及周身之運行各有岡位各有所司行者最重健康而健康則恃乎保持氣流之正常或儲之於其運行之孔道內也見中有聞教得度密法附録由修習此法所生果故將見種種形相或如烟霧或輕清如以太隨得大安樂如欲暈絶靈熱由氣流推送流入之主要孔道謂之中脉本節所述之果相即為氣流進入中脉之功效除此心物兩質織成一因外尚有與之平行之聖淨之因即行者初次瞥見不隨念轉之真心性境如是大安樂境界歐西謂為聖靈之啓發實則得定之初果也行者證得時當下便覺與真心及心源相應甚深冥寂境界由是生起爾時喜不自勝蓋已非凡而聖與一真之境冥合一體矣次應愈益修習俾力能任意出入此境并於住境之時逐漸加長期間終於命盡之後永住此境或改行菩薩道重入輪回導示其他有情亦得解脫觀照身心能所俱遣自覺輕安如浮空際在此境界任何幻象異相之生勿因愛憎而心起取捨如是離於取捨即名令心住於孩童凝視壁畫之境孩童於壁畫毫無取著逐圖瞻覽自始至終凝神而視并不知次圖所繪何如行者至此階段必須習於此類期待而不取著之凝視情境卯四令心住於象觸荊棘之境此法在使能知不隨生滅不絶之念之跳動而起如象觸荊棘以膚粗厚漠然無覺也心寂生照識亦隨起能止即上文以瑜珈方法攝入凝視狀態之識所止即不絶起落之念兩相融即前念後念不再嬗遞既臻冥寂性境潛在之識恐為正知於焉跳躍如為心脉之跳蕩純出自動隨念生起念之進展即為制止不再轉成他念以能止自起不勞尋求故名為識流相續自然起行之境此法令心住於如是之境念起之時既不止之亦不為所動如象觸荊棘漠然不覺因以名焉勝妙聖心如如不動無論身心有何感動不起相應本節瑜珈修法應作如是解惟此僅為消滅生死幻妄以證實相之初步修法之一種此時如有所證仍不得謂為究竟惟以妙明覺心觀照終將悟證生死生涅般無生畢竟無二無別換言之念不念相俱滯兩邊逮至大手印瑜珈法純熟之後方知其為融即也辛三此際稱為最後寂靜之境大海靜水波不興倣佛似之如是寂靜之際以心臻靜止雖觀念念生滅不起相應故謂之動靜隔離之境一切法之二性僅為一真之境之是非兩相動靜亦復如是行者現正準備證取如是境界具如本文後義所詳由此行者已守一緣觀乎動靜不異不離彼能觀之慧於行者體驗無誤之時即為妙觀察智或名出世之智凡心不離淨心瑜珈之旨即在令心之凡淨二相相應惟須俟心離於塵世幻妄而了悟本性之時方能成就妙觀察智者涅般境界之菩提或超世識依是方知一切法之不一不異也詞藻經云所達之地因依如是修法身心得殊勝調伏故名為反照窮源之地詞藻經藏名多德講以經文詞并茂故名庚二分四辰一觀察動不動性辰二證入超世識辰三無生瑜珈三昧辰四證入實相今初寂不起照念念生滅漠然不與相應妙觀察智之力自生行者依力觀察心不動時不動或心之自性為何心如何住於不動如何由不動而動動時是否保持不動之靜寂保持不動之境時是否尚有所動動是否異於不動動或念之自性為何最後動如何轉成不動如是設問玄妙莫測類似禪宗初機所參之話頭除用作觀心修法外并可喚醒超越之智當下便知動非異於不動而不動亦非與動相異若依是觀察動與不動之自性仍未參透應再觀察能觀之慧與動不動性是一是異如是觀察行者以自證分了知空無所有能觀所觀不可分別以如是不可分別之自性不可知故所臻之地名為心行處滅或謂之言語道斷證入真實之境則悟生死涅般兩相相即不可分別遠離世智妄見不落文字言銓此義與玄奧之般若頌所攝空非相無體不異色色即是空精義同其旨趣依照歐西物理學家所發明物質分晰之研究已達物質化電子電子化電能之時期是則心法色法為一體兩相之古瑜珈宗義終將為彼輩證實無疑生物學方面亦發見動植物兩類已不復有界限可分蓋低類生物實具兩類共有之特性植物學家列為草木類而動物學家以動物視之又化學之進程可能使一切混合物體變成非混合體之母素是以瑜珈行者於推究心色二法以求心之自性時亦將明了自性無彼此之分亦無色心之別實係兼而有之心或心行之一切相不可謂為各各分別恰如生命物質雖呈現萬象而其體惟一也瑜珈上師每語其徒云燈焰生光熱而油以竭彼燈焰彼光彼熱彼油之竭四者為相離乎或可離之事物乎於是瑜珈行者得以逐漸證悟心與識之無量相純為真心真智之輻射然如是造詣尚未究竟僅能了解心之細塵耳非俟如露零晴海然轉有為心為無為心證得超識境界方臻涅般之果也勝者主云心著正的縱正亦幻超心如如勿謂正的能見可見永不相離上師惠示方悟真諦勝者主藏語嘉惠旺波梵名藏土大手印瑜珈大師之一正的者藏語達瓦梵文為頂點或意想所及處也如如之境非生滅心觀照所及故非生滅心安立之名言所可銓說是以生滅心所認為之正的終不能出生死範圍縱達此的亦為幻妄今所尋求者為非生滅之涅般既屬超世實不能謂之鵠的蓋為現證已入非生滅涅般之境也關於上乘觀法智者靜天曾開示云當爾堅住寂靜三昧縱為剎那心勿散馳并復運用妙觀察智於念起落分別細審靜天藏語喜瓦喇梵名印度大手印瑜珈學之闡釋家也迦葉所問經以火與薪為喻云薪摩彼薪火頓出生以有此火二薪為焚動靜相融勝智亦起智既出生動靜泯滅迦葉所問經梵名藏名宛宋紀詩貝都如是以勝智反觀名為隱修善觀察三昧迥異惟智論者之禪觀以彼觀察僅為外在之色塵或為待乎感覺而起易言之隱修之瑜珈行者不藉文字名言而起觀純在自心中尋求證悟惟智論者則適與相反以永昧於心之細相故僅以欲界或外在世界以作比量耳是以名為外道禪定與隱修者之內證禪定實有分別於此密喇熱巴尊者云老衲向不珍視或致力於文字名言所起之智以其僅屬巧言眩俗之說徒擾人心非為導入確證實相之修法也辰二任何想念暗障之起毋須捨棄亦毋為所支配任其生起心勿傾側於其起也觀之而已如是久之以念未捨棄故其實相或空相自然呈現行者如此亦應依前導示凝視所起之念或情緒毫不為所左右雖離於念如觀劇者離於舞台上之優伶然其離也應為漠然無動於心之瑜珈離念修法牧人知其羊羣不易調馴任羊嬉游守伺在側心不為移亦不偏傾雖任羊放草嬉戲自如而羊固在望牧人心亦未嘗忘之依此修法一切似為啓發心靈之障者均可善用之以為行道之助是以此法名為轉障為道耶教徒於人之艱苦災難視為有裨於心性此節所攝之意義頗與相似惟為瑜珈教法故較為繁復耳瑜珈上師之闡明此義者以意度之或約略其詞曰游子夜行羊腸小徑忽爾止步旁躍狀至驚駭呼有巨蟒逮驚心稍定緊握竹杖取火視之則盤旋於途者草索而非蟒蛇也乃曰噫是正余所需以束腰者也蘧拾之束於腰際仍復前進惟自慚其迷惑耳迷之為蟒正解起時悟為無害反成有用凡屬有為心之運行亦復如是其為無害而有益者在無明暗障未除不悟正知之際視之適得其反生滅之念與其所起之觀感如以大手印法鍛鍊轉變之則立與法身之真心相應矣瑜珈行者於證悟之時方知念者如色法故有實自周遍真心流出不與相離最初視之若仇者誤矣行者如是窮源反照於一切色法藉瑜珈力漠然無所取著身心舒泰住於寂靜無上三昧於念之起落不絶任其自然不加制止如是行之念動自然合拍與真心之翕闢相應山河大地者即真心翕闢之果也是以想念雖似為道之障而行者善用之足以為助也其他一切障道之法亦復如是蓋依圓覺聖哲之所照見一切生滅法或如無形之念或為有相之體咸為一心所生也詳見辰三唯觀於念了知能捨即心所捨即念性不相離獲得解脫此法為勝道修習心要或名窮源三昧已得解脫於一切有情猶未明心見性頓起無限悲憫行者至此境界已由有涯常我塵心或識進展至無量無我真心或識今應修反觀之法即自真心不偏不倚無我無私之立點以觀察有情之心即大比小照見一切有情迷於有涯幻起之心而未悟真心大悲於是乎起矣行者終其身致力修觀身語意回向衆生以依上來修慧教法已悟色法非實故如是顯為自利之回向於彼不足為害如服密咒加持之毒物不為所傷也設於回向觀想如為因己而起則一己獨立存在之妄見隨之而生矣是故行者於一切衆生無二無別之真諦應信證不退反於是之信心猶為毒物應即避之而正信則為密法加持之毒物或為毒物之對治也是以回向者應視若當然應為之事切勿計及自身於此除哲理外應知健身瑜珈有特殊修法藉法吞服一切種毒無害於體據傳如是毒物即係經過密法加持者換言之毒物以按瑜珈鍛鍊輸入靈力毒性為消轉為無毒也為審慎修習此類似自利回向法故祈禱文式特有規定今述其一頌云行道所見余無取捨祈禱聖師全文云行道所見余無取捨惟願上師准賜恩波一切色塵緣起故有俾得證為法界之性恩波者具如他處所明為自佛剎及淨土內諸上師在灌頂時流入塵世門徒體內之靈力如為電傳裨助極宏法界之性者法身所化之三相也詳見中有聞教得度密法編者原敘今就禱文所攝之觀點解釋如下甲周編之身即一切形相上自超生死佛身之妙相下至最低類生物體相同一本原之象徵乙周遍之語即一切音聲上自佛語下至自然界四大之元音同一本原之象徵丙周遍之意即一切識覺上自證覺者完全開朗之心或識下至極微生物之自然感覺功能同一本原之象徵辰三分三巳一觀察三時巳二觀察心色巳三觀察一多初又分二午一過現未三時午二生滅時之非實今初觀察三時當如下說過去之念已滅未來之念猶未出生自屬無體當前之念亦不能確認其為現在當前之念停住時間不過剎那隨起隨滅實難說為現有其實與未來之念性不相離以未來念起即成現在故與過去之念亦不能分離以現在消逝成為過去故是以現在與過去未來三時不可分別如是禪觀意在使行者證悟過現未三時無二無別并使了知塵世時間觀念之謬誤以時間正如其他一切生滅法純為幻化故依是觀察久之自能了悟一切生滅性不異三時之性心未啓迪所緣一切僅為如幻不實之相但已獲成就之行者照見一切法之本性則知其為法界不可分離之部份依照下節所示一切如幻而有者唯心造故妄念差別故一切法本無因心所現故此節如再直譯之可為一切法離心無生心生故換言之一切生滅法離超世真心外了不可得山河大地者真心翕闢所顯之用印度教謂之大梵之夢蓋指其為夢之境界耳大手印教法者即以促使行者自此生滅夢中醒覺為目的其他一切真實瑜珈教義亦復如是午二莎喇哈大師於悟證生滅時三者自性皆空時有偈云生滅時間有譯為生滅住者於此應知東方大智哲於相對論學理早著先鞭蓋生滅時者對心立名心有故有也生之於色如空雙遮色若遣離尚何云生無始來時性本無生荷師顯示妙諦今證空者此處以非此非彼喻之非為如妄心所對之欲界色塵可以計度差別之相是以不陷兩邊色法實有之妄見既經證覺之瑜珈行者遣離以其如幻不實且僅待於心未啓迪者視為實有而有故則生者待色而起自亦遣除或轉成不陷兩端之中道如為無可差別虛空之性於是於證取如是境界時同時了悟一切生滅時見純為生滅性或本無自性禪觀之法應依此頌行之巳二觀察心色修法如下心者為成自色法而有乎抑非成自色法而無乎如為色法成自何色如為外在境界是何相狀是何色彩如為內慮功能亦如念之剎那生滅乎如非色法如何作種種相又其如何生成如是觀察其心如屬色法自可視為實在但以勝慧觀照便知所謂心者了不可得是以不得謂為成自色法再以勝慧觀察非為色法亦非空無如是非色亦非非色不落兩邊名為中道中道者梵語瑪底牙密嘎瑪嘎藏語烏美藍佛教中論宗以中道義得名不落是非兩端也巴利經藏雜阿含經之雜集因緣品云是為一端非則另一端如來避於兩端說中道義如是堪證之實相除需有上師導示外僅憑演繹與歸納方法心不能達譬諸無價之寶唾手可致而自未注意上師之導示即使之注意也是以如是導示亦名大法茲倣上師親傳式概述如下誰為能觀能觀者勝慧亦即超世之識也所觀者何所觀者靜與非靜不動與動也勝慧何自而生勝慧者生於一切心融即之一心也何者為心心者不可見無自體心行處滅言銓不及無生無作蓋實相也縱經諸佛親證既未眼見亦非其他五根所能明輪回六道有情所居涅般圓覺佛道境界以是為因從是分界故并無實體非異非一超絶兩端須經修習此中所說上師導示後方能證為中道古德云上師導示深印心田寶藏不遠藉此可見內心者一切真實財寶之源人以貪戀塵世尚未發見人既不知本來面目又為無明驅使不斷流轉生死以上師導示始獲解脫之道猶寶藏之為人忽視也久矣上師啓示方顯無價之珍是以虔誠學人擺脫塵世出家修行則涅般之果可致矣巳三今當宣說一多之觀察心者為一為多如一現見有種種相如何是一若多則一切法本性無二無別如何是多心者如人所知為一體而有感受了解計度憶念識覺等種種相如是等相世俗謂離於心而各別存在然以真諦察知實為空性即與真心不可分離之一性易言之宇宙大心者一切法與之相應不一不異宇宙小心者其反映也如是觀察使知心者非多既離於一多兩端名為不住於完全寂靜或終滅之大手印境不住於完全寂靜之境者即不住於涅般安樂之境藏語喇都米那巴以大手印為象徵中觀宗藏名烏瑪巴謂為實相或空相之無上境界該宗釋云空相者非無非有亦非非無亦非非有文字言語不能銓說以文字言語純為感於欲界境相而起之妄見所安立而實相者離於欲界之境相也大手印上師信受如是中觀義理故教人勿以涅般為止境彼證涅般者住於常樂我靜純為自利耳換言之涅般者非為自利應為利他而證庶一切有情得同臻此境是以藏土之企冀聖智求證所謂涅般之正覺者咸發願為菩薩或大導師願文大意為具願者非俟一切有情下自地球及其他一切星球上最低類亞人生物上至諸天中未證覺之最上神人以及地獄受苦衆生盡渡生死海而登彼岸不入涅般南方佛教徒於獨覺羅漢證得涅般時往往視之為止境而大乘佛教徒則謂涅般者心在覺性進化後所臻之境惟以進化常在嬗遞不可謂為止境如此則涅般亦不能視若最後之地也行者如是證得寂靜三昧勝慧妙觀察智獨自顯現是以大手印或謂實相名為無分別三昧辰四由於上來修法一切信為實在之迷執已自心滌除眼見者盡為幻妄如燈幻形是以經云前後觀瞻遍及十方目所能擊如如而已上師加被妄執已除自是而後於人無求巳二非常修法分二未一轉不可分離之一切色與心為一體之瑜珈未二一切法藉俱生無垢心或大手印之力得以轉成法身之無禪瑜珈初又分三申一藉睡夢之喻了悟色即是心申二藉水冰之喻了悟萬象本體無二無別申三藉水波之喻轉一切法為融合一性之境今初無禪瑜珈藏名貢美吉那爾倦指較高之瑜珈境地在此地內所謂禪定之轉變者與禪定喚起之勝慧俱時而起禪定者本為證取如是頓覺境界之方法證入之後禪定不復需要猶之行人乘筏渡河既達彼岸則筏無用矣夢中所見不離於心是以醒覺時一切色法僅為無明迷夢境界離心亦無自性以心幻成故世人沉溺生死海中其智所及不出感覺即欲界比量而得之知其實一切塵世之知均非真實復因深著我見真智為遮是以瑜珈行者名之為無明梵語惜迷妄之衆顛倒夢寐水深火熱不知妙覺解脫之道耳任何念起或幻想之起以輕安之心任運觀照自悟一切外在色法與一己之心及其內在色法一一不能分離立即轉成一真實性瑜珈之主密喇熱巴尊者云昨夜所夢色心不異夢為導師爾等知否古德亦云三界轉變成大悲心無有少分不隨轉變佛教徒分世界為三界即欲界色界無色界也轉變者為一種不可思議之變化進程藉瑜珈方法修成之增上觀想而起旨在助成行者於心性上證入所求完全利他之菩薩道行者修習之時上師導示約略如下三界形成之世間應觀想為一體之兩相世界之動相視若佛父藏語此土謂陽智相則視為佛母藏語此土謂陰觀想兩者相合藏語陰陽也不可分離瑜珈行者之鵠的即為證入如是聖淨之一體所謂大手印法者是也行者達此時期上師或概示大手印教法如下以證入超生死無常與苦之實相了悟心色萬象本體以及一切對立之兩相實出一體不可分離故頓臻圓覺利樂如是既臻實相位躋菩薩於一切有情之沉沒無明不勝悲憫誓願濟拔之重睹法界光明是以行者於已入大乘菩薩道後大悲心智自然出生也申二現起萬象或萬象所呈相狀以無自性故可謂為自本體流出雖非實相而宛然有相如是萬象本體永久融合同屬一性猶水之與冰一體而兩相也換言之萬象者出自真空即本體之陰影或為萬象之本源全部大乘表徵中其最為歐西學者所誤解者莫若佛父母交泰之相實則如是之相象徵萬象與本體本屬一體耳蓋一切兩相縱如可想像之生死涅般最高兩相均為一體之徵也依是修法便知安樂之與真空明光之與真空智慧之與真空三者雖各為兩相實皆相合之一性是以名為一切心行融合一體之現證每一兩相中空者一切心行縱為細塵所由起之本體也樂者正覺之樂也明光者內心妙明也智者聖智也融合一體即陰陽之表徵經云如人了悟一切如如如如之外不見一切念誦記憶無非如如即所觀想亦為如如申三以波生自水故一切法之如何由以空為自性之心出生可以知矣莎喇哈大師云森羅萬象唯心造故以是知心無異上師按諸各宗佛教基本義理人間上師者僅如大導師喬答摩如來之為導行者而已求涅般正覺者必須以身作則以踐道者為其自己而非上師如人之飲食純為自身營養也且如世尊所示朝聖者於朝參旅途中實應以自心為光明以自心為歸依蓋涅般須行者躬自證之非上師所可代證也此法名為周遍法界之一法又為一中顯多行者於成就之後一切心行皆證為空蓋智慧之果相也法界者梵名藏語秋吉蔭直譯之為法種未二今說一切法藉俱生無垢心或大手印之力得以轉成法身之無禪瑜珈修法應滅無明既已消散能滅亦止所謂修道已告成就如旅行之業已完成也旅行既終則終點之外別無可詣之處行者於是獲得大手印之殊勝利樂證入無住涅般之境藏語米內拜此云無住妙娘來台巴者遠離於苦之謂即梵語涅般之藏文正譯也涅般既臻輪回道絶涅般之外別無去處蓋涅般非實有其地亦心之境界而已惟按諸上述大乘佛理進化遞嬗永無止境是以涅般惟應視為心靈在永久進程中所遇休止之所耳覺者於生死涅般二者不生分別住於涅般亦住生死二者於彼復非所住若以涅般為所住換言之若視涅般如賽米族人信仰之天堂為終止之境則此外進展即無可能矣上來已述諸佛菩薩不入涅般願住世間利樂一切有情爾許菩提心力如是加被世間其迷妄之毒將於諸劫期內逐漸消歇并藉諸佛菩薩廣大周遍之悲心導使世人逐步進趨至於至德之行在無盡之未來我人不難想見如是佛菩薩悲力於世人之求生存苦終將一旦消除之化惡為善并以聖智之光消散無明三界如是轉變則生死涅般融即一性於是一切有情咸證大手印利樂生死流轉永久終止衆生盡入涅般證取不可思議之勝果巳三教言撮要大本生死變易法中那洛巴尊者援引其享有盛名之上師諦洛巴尊者之語如左此法在藏土屬諸論藏宣說變易遷移身識往生他土之密法書之全名為那洛巴尊者超世勝法善入大乘妙道變易遷移身識導示録本文所引之頌係說明成就大手印瑜珈之行者所經之境關於尊者遷移識體法之精義詳見那洛巴六法一靈熱法二幻身法三夢境法四明光法五中有法六遷識法及遷識瑜珈美哉斯慧妙悟自性言銓不及非心所緣余於此外復何宣說藉爾心印了悟自性令心安住本性之境慎毋作意思量觀察須禪觀亦毋反省心印者指純以象徵傳授之法行者於灌頂之時或已受持於心矣如是頌言為上來一切教法之心要本文教言竟丙三結述分三酉一了悟大手印并與之相應酉二踐道時觀察障礙與三誤四迷酉三體驗與實修所生之知異於理論或因名顯義之知今初了悟大手印并與之相應者層次有四一達於寂靜之境二修時體驗應善用之三種種體驗與暖等四加行以及道上所踐之各分位應一一區別之四證得如是造詣之果相智應保持之了悟大手印并與之相應者換言之即行者不僅必須了悟其教法且應超絶世智親切證入達於寂靜之境者原文直譯之為樹立基礎意謂行者必須以寂靜之境為行道之基礎也修習瑜珈至某一分位時行者經歷暖頂忍世第一法四加行相暖者如火燒盡色心之妄執助使行者證知實相隨初見道時而起頂者實相在完全呈顯前閃發之最高度實相光現無明暗障消散此後因聖智煥發道心堅定於是行者以忍加行力進修至於世第一法即所謂涅般也如是四層次為成就瑜珈之要素酉二踐道之時觀察障礙與迷誤修法如左色法為障心為之擾了悟心色不二障礙自消念起為障了悟念與法身不二障礙為消本體起障了悟本體色法非二障礙消除心以為障始謂之障入道之初心未啓迪以執一法為障鋭意除之身心不安矣證入法身或法界或實相之際頓覺念起念落任運而來與一切法之節奏自然合拍是以與法身無別法身者一切法泯滅其中融為一體至為玄妙也於禪定所生冥寂之相起執著故致有三誤防止之法行者之心靈進展應指向體驗之超世正見境界三誤者一於觀察念與念之遷流起執著二於如是觀察所起反映起執著三於心之寂靜境起執著行者於三誤中堅著一誤習以為常進修即無可能行者中有執著於心之寂靜之境者而以修習健身瑜珈行者為尤甚設無大智上師獲持不求前進往往迷惘愈增誤為得道以有如是原由上師之責不僅在於教義之闡示且應將修道種種陷失以及未成就前中途必將經歷無數感官上之幻象等深深印入門徒之心也超世正見者實相也證入之後幻妄不起蓋與禪定之際回不相同也行者於修道時易於迷入歧途者有四一迷於空應觀空如大悲心以對治之二迷於固步自封即令心不進證實相應證知一切法之自性以對治之三迷於能止試止念之起應悟證能止所止一體非二以對治之四迷於所行之道應了悟俱生大手印并獲得解脫以對治之迷於空者起自自利之念如云余將不再投生人間此為余住世之最後一次余將永離生死余已證果余已證得涅般等語非俟一切人法我見根除轉成無我廣大利固步自封者藏語健兌封閉為義蓋指自我主義為最極重大之謬誤或指人於所得所解自謂完滿無誤之妄念如是閉塞心路不再進求實相則心靈進展自無可能以是謂為智哲者之絶途且歷經證明為各宗教團體之極大弱點各宗教之衰敗亦由於此蓋各教引經據典無不以經文所示之真理為圓滿為究竟也學人先經導示止念之起隨悟念者不僅不應制止且用力止之念反增多故其次修法即為停止一切制念之力令心住於能止之境恰如孩童之應升較高學級而反留讀於幼稚園也俱生大手印亦可解作法爾淨心常恆之境證此心時即得解脫特塵世之庸衆不悟耳一旦解脫則於所行之道不再迷執然行者中有於證果之後仍好重溫修法或追踐所行之道者此殆由於彼輩之偏嗜瑜珈法門而起如能永住解脫之境其患自失酉三體驗與實修所生之知異於理論所起之知修法如左依於聞思而明了心真實境者僅為理論所起之知了知一法異名即心真實境者為體驗之知如實通達真心直了無生者方為信證惟圓智之名須俟與圓智相應庶不相違一法異名者指行者修時所證之心境以小宇宙心返至本來真實之境時乃一無垢無擾如如常流之識體不生不滅起自法爾一心仍還諸法爾一心也以己體驗超越境界故內心證知目的在未成就前宛然在望行者於是完全信證實有目的在前如人於旭日未升前先見晨曦確信日之必升也易言之虔信學人在未究竟證得無生之涅般前深信無生可以證取也大手印瑜珈法要本文竟乙二造文因緣以下為本文之來源如木刻本第七葉第二面及最後一葉所載為一饒有興味之故事藏喀國王名鑽芬藏波者發願將大手印法要與那洛巴尊者六法編成標準經文以價值九千六百盧比之紅花供奉編者即王之上師名白蓮花祖師編者以本文顯有甚多擅改篇段混充録自各經論者經於編時盡行刪除以大都難以徵信故滲淡經營方成此書以之流傳溥利未來有情編時編者方閉關虔修心要於喀珠南山中地名圓覺之心願斯流出利樂吉祥本節尚有加注如左為廣增法益故確嘉鎖南嘉藏居士捐獻本文本刻版鎸費每版銀幣一枚藏喀者藏語意謂白銅地當喀什密爾與拉達克兩地之間鑽芬藏波之名源出梵文譯為漢義善巧助人王效法世尊棄國修行那洛巴尊者六法亦為白蓮花祖師所編喀珠者藏語西藏南部之山嶺北望拉薩東接不丹國位落洛達滄波縣江水橫流以縣名為名圓覺之心藏語為占居寧波似為隱修所在或為與村落不通往來之地名確嘉鎖南嘉藏藏語者此翻為持吉運旗法王恐為某貴族兼為虔信居士之尊稱本書計有七葉每葉長英尺一尺九寸有半寬四寸前後面分印共為十四面刻成十四木版故某貴族居士共捐獻銀幣一十四枚
