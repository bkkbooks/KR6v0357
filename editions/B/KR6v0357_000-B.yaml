body:
  text: 涅般道大手印瑜珈法要釋編者原敘美國伊文思溫慈一大手印教法之由來東方持贈西方之禮品其哲學及宗教史乘之更足重視者莫本書若即於研習持心術所謂瑜珈者之學人亦罕有較本書尤堪寶貴者書中含攝若干甚深東方密法之菁英并非陳舊遺佚得諸一度昌盛而久歸堙滅之文化殘蹟中者乃為歷代秘傳不絕以迄於今之教法也本書所載大手印法要之教義在耶教未入歐洲之前早經古代印度婆羅門教及佛教選授少數優秀教徒徵諸源出印度之藏土傳說佛教聖哲莎喇哈大師以歷史言其實在年代約略難定或曾在紀元前第一世紀宣說此法彼時已屬古學直接傳自遠古之聖其後經諸上師燈傳不絕成為悠久光榮之系統大師者僅彼中上師之一耳據傳此種教法經由莎氏大弟子龍樹菩薩約當紀元後三百四十四至四十六年及菩薩諸門徒一脉相傳純用口授迨至紀元後十一世紀當喀覺宗創始人瑪爾巴尊者自巽本土西藏雪嶺高原遠往印度平原尋求聖智之時印度佛教智哲那洛巴尊者即以此教法授之那學大手印教法於諦洛巴尊者蓋十世紀中葉最享盛名之上師也諦則按喀覺宗傳述為無上佛金剛持尊所心授金剛持尊者秘密名號所以表神秘威權之意喀覺宗之傳述如說明之實含有該宗枯恃金剛持尊心傳諦氏俾其輾轉付囑成為藏土喀覺宗上師新系基本教法之意此法流傳印土既遠在諦氏之先則如是說明或較確切即已故喀齊達瓦桑杜喇嘛亦不無心傾此意喀覺系上師人間以諦為首并以金剛持尊為天上根本導師傳燈次第在西藏瑜珈大師密喇熱巴尊者傳中敘述甚詳傳之英譯本為註釋最完善之一種堪為與大手印法要兼習之用密喇熱巴尊者為瑪爾巴尊者之傳缽弟子據傳中所述以修大手印教法而即身證得佛果現在西土瑜珈各宗教徒咸視為名列史籍最大瑜珈師中之一人考諸藍色紀事藏史中最可信徵之一種藏土大手印哲理之上乘學派有藏譯大手印教法三種均源出印度稿本第一種為尼路巴大師所留傳第二種區為上下兩分上分為印度學者卡納入藏時所傳下分則為尼泊爾佛教徒阿修小住烏省時所傳此外尚有較晚之本經藏土尼耶利地方之那波顯達譯成藏文那波曾到印度并與卡納相晤最先密教改進者阿底峽尊者梵名燃燈智紀元後一千零三十八年自印入藏力自宣說大手印哲理在瑜珈學上之重要性遂為藏中第一導師意彼亦如下世紀初葉之密喇熱巴尊者為一善闡實施大手印教法功德之大師其後有唐大師另譯之藏本惟唐於教法之傳布似未盡力耳瑪爾巴尊者亦自印度原書想係梵文重譯藏文其他瑜珈行者之譯大手印教法者尚有大日喇喜達尼路巴雷冲即為密喇熱巴尊者作傳者等三大師至我人之刪訂本係白蓮花祖師在十七世紀時所編彼時藏中譯本為數甚多而其中舛誤百出祖師於一一核訂後始事編纂本書之造論因緣分云編者以本文顯有甚多擅改篇段混充錄自各經論者經於編時盡行刪除以大都難以置信故上乘為結晶於本文內之教法自史前由上師逐代相傳以至現代之經過至可信徵也二原文及英譯我人所用之大手印法要原文係不丹國布格若杜阿地方之已故隱修喇嘛諾布上師按照古代不可違反之傳法成規傳於已故喀齊達瓦桑杜喇嘛達為編者之上師原本經其譯成英文再傳編者是書係初次見諸歐西文字据達自云為俾益世界之非西藏民族而譯本書造文因緣分述及喀什密爾國王鑽芬藏波為籲請其上師白蓮花祖師編纂本書及那洛巴尊者六法故曾以二十餘升紅花供養祖師按喀國量法八十托拉為一細安四細安為一升是以王所獻紅花之數量超過六千四百托拉以上現時每托拉最上紅花約值一盧比有半二十餘升共值九千六百盧比再以英金折合一盧比可換十八辨士全數計為七百廿英鎊亦即美金三千六百元那洛巴六法者補瑜珈修法之不足亦經達瓦桑杜喇嘛譯成英文與本書仝本流通我人所据以譯英之本即為編獻喀什密爾國王之原稿正確無悞茲再將編後流傳經過概述於下約當十七世紀白蓮花祖師藏語全知白蓮花之意自藏至不丹國革新密教與六百年前阿底峽尊者在藏改革密教情形極為相似白蓮花祖師進入不丹之時曾携有所編本書副本一冊若干年後約可確定為去今一百五十年以前確嘉鎖南嘉藏居士捐獻本書木刻版每版鎸費銀幣一枚見本書造文因緣分我人所有木刻藏文本即係印自原木刻版者全書連封面共有七葉每葉為一版印成後摺為前後兩面是以確嘉居士捐獻之鎸刻費共為一十四枚銀幣木刻版原存不丹國首都布納卡之敕建大寺中本書印成不久不丹國內戰突起原版隨印刷所仝燬於火至本書之如何為譯人所有今錄其自述梗概如左西歷一千八百八十七年十二月至一千八百九十三年十月之六年內余為英國政府之繙譯官駐於不丹國近印度邊境之布格若杜阿地方在余任期之初得值後所依止之諾布上師時人稱為隱修上師諾布者藏語珍寶之意其灌頂時之法名為盛譽余皈依後不久上師傳余大手印法要之教義并獲適當之灌頂與導示彼時上師有仝版法要本三冊一千八百九十三年余將離不丹前往叩別上師以一冊贈余旋即失去一千九百零六年餘應哲孟雄國王之聘前往剛渡掌教國立普廈膳宿學校此書恐係於離去剛渡之時為人擅自携去一千九百十六年二月余應英國吳約翰爵士筆名阿瑟阿伐隆編有密法叢書之請翻譯聖樂金剛法余往謁上師備極致敬籲請恩准并求啟示仝時復懇允可翻譯大手印法要及其他類似之瑜珈論藏以各論咸如本書為非常珍視之密法非經上師許可不能公諸於世也上師諾余所請云此土人士日益繁殖其能心切尋求心靈啟迪者鮮矣行見妙法廣被歐美以應求法所需也此為上師最後訓示八逾月後即一千九百十六年八月上師具足正智入般涅般享壽七十有八歲參謁既畢將行叩別上師以前贈木刻版本余已失去復將自用之本賜余以壯行色是本後亦失踪誠怪事也其第三冊亦即最後之本上師駐錫布格若杜阿時曾以之贈其一徒經余函索得之我人据以譯英者即此本也以余所知此外世無他本即在不丹國內亦難覔致關於上師之生平茲略述數語以增興味上師不丹國人系出望族其家向以虔奉佛法名聞國內其舅氏為敕建大寺之主持本書木刻版即屬寺所有上師童時其父母捨諸寺中依止舅氏旋即受戒在寺學法上師不僅為其舅氏之世間財富合法承襲人且於其舅氏圓寂後循例應繼承大寺主持之位惟以彼時不丹國社羣鬥爭時有發生縱為僧侶合法寺廟權利往往為自私世俗之眾所侵害布納卡地方之某首事人利慾薰心於諾布上師之承襲一事大加非難上師以自孩提以迄成長衣食寺中如任長此爭辯於寺不利遂毅然捨棄一切財富以及主持之位離寺隱修於布格若杜阿地方余之得遇上師即在彼處諾師為永住梵行守願不違淨行受足大戒之比丘比丘者棄絕塵世普渡眾生居無定所十方行化之僧侶也性仁慈意志堅定虔誠奉教目光之銳非常人所及今已入滅而余失所依止矣余編者自稱與達瓦桑杜喇嘛在哲孟雄國之剛渡地方從事翻譯中有聞教得度密法與其他藏典後達授余大手印教法仝時提議以之譯英計自一千九百十九年七月二十三日開始翻譯起至月終為至初稿竣事工作雖艱難而完成殊速修正後譯本告成達譯人而兼為余之上師曾自述感慨茲錄其語如左余欲翻譯大手印法要者屢矣乃以文旨既玄妙難譯尤非熟諳歐西文字與哲學名詞譯文難期明晰余於二者素無根底事雖未果而期望猶殷今賴子之助素願始酬余為之歡喜不置蓋如是妙法今竟能遵諾師付囑廣被人間尤能宏揚於歐美博學精思士女之間也三大手印教法之勝義大手印者藏語謂之差珍等於梵文之此譯大相狀譯人寧以之譯為大手印取其意之符合藏語也法要一書導示如何藉瑜珈方法可臻心繫一緣由是洞達真實自性誠屬不可思議大手印又可名為中道以其不落兩邊也兩邊者世尊一再宣誡以苦行制慾與沉沒私欲各著邊際設依大手印之瑜珈教法而實習之行者頓覺登於正道道之終果為涅般此時即能脫去大自然輪之束縛不再淪入生死輪迴本文教法藏土相傳已歷若干世紀或由口授或見諸稿本不無受藏土佛教之影響然其基本瑜珈勝義如與印度上師所傳類似教法比照參考之果無變更也印度恆河之畔數省連界鄰近力吉開希之比邇巴達地方有小規模之瑜珈學校主其事者為嫻於瑜珈學之真喜主大師編者曾以本文英譯請彼評閱彼於大手印法之若干過於詳述部份雖意不謂然而於文之要旨則視為確屬超越尋常之價值据云是法所示持心術要者唯三即一修觀法二金剛誦止息法三緣身作壺形令心離於吐納之連續法又云以余所知本書為傳授此種瑜珈教法之唯一著作余昔撰述隨順瑜珈令成法一書於瑜珈理氣之學多方探討以期發見真實法門設於事前得讀此作當不致空耗甚多時間也按本文原旨大手印瑜珈須由適當上師導修之真喜主大師亦持此說文中若干教言之所以略而不詳者正期上師之補充耳諸凡瑜珈法門見諸文字者大都如此古時巴壇闍黎之瑜珈經即其一例故教法之原為口授者錄成手冊時僅為簡略之綱要而已間或僅為上師口傳之語錄門徒陸續紀之手冊以備不能親炙於上師時自作楷模之用例如用於門徒短期隱修之時最後真喜主大師述其評語曰諸行者不能按照正常方法修習瑜珈則本文極應為所注意本文內關於意清淨之理論部分於彼輩尤有大饒益至身清靜與語清淨二者之修習與否或心之應否離於吐納之環則無何顯著之重要蓋意清淨法門極易奉行如實行之即此決門足予行者以不可思議之安樂有非世智所能了解者也四上師系統大手印教法之印土或根本上師系統本書禮敬部份稱為白系按諸傳說可就吾人所考自紀元前第一世紀推算至瑪爾巴尊者之時代尊者於紀元後十一世紀之下葉始在藏土創立白教支系是以教法輾轉相傳約有二千餘年之歷史特其傳法不一耳再按喀覺宗之自道教法歷史更可追溯至紀元前無數世紀以前藏土土師系統之始祖瑪爾巴尊者據傳曾在印度學法十有八年請益於彼土之智哲約有百人之多是以尊者所傳之大手印法藏文本必係根據於彼時在印所得最可信恃之本自瑪爾巴尊者求法印度以至藏土創立白教之時期內印土異教入侵結果社會宗教均有改革彼時大手印宗印土上師系統是否繼續保持此時實難推斷所可知者則教法原文一如無數其他梵本在印業已散佚不傳惟藏譯猶存在耳白教上師系統在藏支系以哲理而論與藏土其他各宗迴不相同白教通常稱為喀覺宗喀覺者教敕傳承之意自瑪爾巴尊者時代以迄今日喀覺宗哲學及其苦修方法向以大手印法門為基礎而進窺密理瑪爾巴尊者之傳缽人密喇熱巴尊者致力苦行行脚十方曾在西藏高山雪嶺最幽僻石穴內隱修有年據其事略所載隱修時以淹通大手印瑜珈遂擅神通變化故喀覺宗教徒之所以成為實修瑜珈派迄猶興盛者雖始自迻譯印土哲理之學者瑪爾巴尊者不若謂為始自成就密法之聖德密喇熱巴尊者較為適當密喇熱巴尊者於其兩大卓越門徒達波拉傑及雷冲外據傳曾造就精諳瑜珈之弟子八人深通靈熱法者一百零八人藏土入冬氣候嚴寒喀覺宗瑜珈行者雖披布衣足以禦之以體有靈熱故此外尊者復拔無數男女門徒而登菩提正覺之道依雷冲所述以尊者宏願大慈之力故奉行其遺教之聖徒為數之眾幾如天空閃耀之星座其不還塵世者亦如地球上之沙粒無從計算至男女信士之修行者尤屬不可勝數達波拉傑繼密喇熱巴尊者為喀覺宗世間上師之第三祖見西藏古德寶訓序嗣後白系上師計自瑪爾巴尊者起輾轉傳承至第二十四代為大手印教法之撰述者白蓮花祖師喀覺宗教派文獻中有名持寶語聖者藏語尼牙旺諾爾布蓋即祖師灌頂時之法名也瑪爾巴尊者後六百年間大手印法藏上稿本抄傳甚多有經修訂者有加評註者白蓮花祖師既執白系教派之牛耳必曾徧讀各種稿本故於其弟子喀什密爾國王述願之時纂集各本要旨編成大手印法要一書我人所譯者即據此本按可信傳說王之往謁白蓮花祖師也虔誠如朝聖之香旅并如修成喬答摩佛之悉達太子然厭惡塵世棄國相從經祖師收列門牆先令服役以覘其根器如何意志是否堅定此後經祖師導示研讀佛法修習瑜珈若干年後王始返國為僧并在國內似曾創立白系教派已故喀齊達瓦桑杜喇嘛以為拉達克地方喜密斯寺保藏之傳燈錄中或有關於喀什密爾國白系之文獻緣喀覺宗支系曾各宗師承分宏不丹國已往該寺與喀覺宗之關係文獻中必有記載也依本文所明白蓮花祖師隱修之處在西藏極南部地接現在不丹國之邊境喀什密爾王即於彼處供養祖師紅花二十餘升喀什密爾者紅花之產地也時至今日關於喀覺宗密義咸以白蓮花祖師為圭臬祖師撰述至富如占星醫方聲明古事祭方工巧知明內明密法等均為垂範之作據傳共纂集五十二種至五十八種之多祖師復善詩歌其密教本事歌尤傳遍不丹印成通俗本名曰聖詠貫珠祖師與第五世達賴喇嘛為同時代人入滅於西歷一千六百八十年當白蓮花祖師住世之時不丹小國以地處喜馬拉耶山麓較之西藏知者更希彼國人民文化低落好事刼掠習於內鬨十七世紀末葉有白系傳統上師自西藏喇隴寺進入彼國以授自白蓮花祖師之淨心聖法賡續宏揚信受者甚眾據云聖德所被猶如日出黑暗頓消且以其非常法力極為彼國人士所推戴奉若法王稱彼為辯才無礙摧壞幻妄無能勝者藏語尼牙旺南嘉竇琹多傑大手印教法由彼再傳隱修諾布上師繼續不絕上來為大手印法與我人所有法要稿本以及白系上師之歷史極饒趣味自此教法輾轉相承傳至我人是以譯人懇切盼望凡讀本書而信受者可藉其助縱為少分分享本書賜予之傳統靈力以登於道終臻無上之果涅般道大手印瑜珈法要釋科文分二甲一禮敬甲二本文分二乙一所造文體分三丙一入門教言分二丁一世間教言丁二出世教言分六戊一皈依發心與上師相應戊二七支禪座戊三七支禪坐之果戊四語清淨戊五意清淨戊六四念處丙二本文要義分三己一通俗修法分二庚一修習專繫一緣之瑜珈證取身語意清淨之境即禪定之的分三辛一緣於外物分二壬一不調息緣物分二癸一於尋常物體如小球形物或小木段癸二緣於清淨法物如佛身語意之表徵分三子一佛像子二字相子三種子壬二調息緣物分二丑一金剛誦息丑二緣於壺形辛二不緣外物分三寅一剎那念起頓即根斷寅二任念運行不生分別寅三心住清淨本性想念來擾不為所動分四卯一如紡梵線卯二如斷草索卯三如孩凝視卯四如象無覺辛三最後寂靜之境庚二修習無生瑜珈觀察動不動性以證超世識體分四辰一視察動不動性辰二證入超世識體辰三無生瑜珈三昧分三巳一觀察三時分二午一過現未三時午二生滅時之非實巳二觀察心色巳三觀察一多辰四證入實相巳一非常修法分二未一轉不可分離之色與心為一體之瑜珈分三申一藉睡夢之喻了悟色即是心申二藉水冰之喻了悟萬象本體無二無別申三藉水波之喻轉一切法為融合一性之境未二一切法藉俱生無垢心或大手印之力轉成法身之無禪瑜珈巳二教言撮要丙三結述分三酉一了悟大手印并與之相應酉二踐道時觀察障碍與三悞四迷酉三體驗與實修所生之知異於理論或因名顯義之知乙二造文因緣
